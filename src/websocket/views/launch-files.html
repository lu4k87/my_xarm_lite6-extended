<style>
    .launch-tree-container {
        padding: 30px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.03);
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .modern-tree {
        list-style: none;
        padding-left: 0;
        margin: 0;
        font-family: 'JetBrains Mono', 'Inter', monospace;
    }

    .modern-tree ul {
        list-style: none;
        padding-left: 30px;
        margin-top: 10px;
        margin-bottom: 10px;
        margin-left: 15px;
        position: relative;
    }

    .modern-tree li {
        margin-bottom: 15px;
        position: relative;
    }

    /* Vertical line for the branch */
    .modern-tree ul::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 2px;
        height: calc(100% - 22px);
        /* Stops at the last horizontal line */
        background: rgba(255, 255, 255, 0.1);
    }

    /* Horizontal connection */
    .modern-tree li::before {
        content: '';
        position: absolute;
        top: 22px;
        left: -30px;
        width: 20px;
        height: 2px;
        background: rgba(255, 255, 255, 0.1);
    }

    .tree-card {

        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        padding: 12px 18px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        width: 100%;
        box-sizing: border-box;
        position: relative;
        overflow: hidden;
    }

    .tree-card:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateX(5px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    .tree-card.is-entry {

    }

    .tree-card.is-entry:hover {
        border-color: rgba(14, 165, 233, 0.8);

    }

    .tree-card.is-launch {

    .tree-card-header {

        flex-wrap: wrap;
    }

    .tree-card-title {
        font-size: 1rem;
        font-weight: 600;
        color: #f8fafc;
        letter-spacing: 0.2px;
    }

    .tree-card-pkg {
        font-size: 0.75rem;
        color: #94a3b8;
        font-weight: 500;
        background: rgba(15, 23, 42, 0.4);
        padding: 2px 8px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .tree-card-badges {
        margin-right: auto;
        margin-left: 0;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        order: -1;
    }

    .t-badge {
        font-size: 0.7rem;
        padding: 3px 8px;
        border-radius: 6px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .badge-entry {
        background: #0ea5e9;
        color: #ffffff;
        box-shadow: 0 0 10px rgba(14, 165, 233, 0.4);
    }

    .badge-node {
        color: #c084fc;
        border: 1px solid rgba(192, 132, 252, 0.4);
        background: rgba(192, 132, 252, 0.1);
    }

    .badge-launch {
        color: #f59e0b;
        border: 1px solid rgba(245, 158, 11, 0.4);
        background: rgba(245, 158, 11, 0.1);
    }

    .badge-container {

        border: 1px solid rgba(45, 212, 191, 0.4);
        background: rgba(45, 212, 191, 0.1);
    }

    .badge-comp {

        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(148, 163, 184, 0.05);
    }

    .tree-card-path {
        font-size: 0.7rem;
        color: #64748b;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        padding: 5px 10px;
        border-radius: 6px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.03);
        transition: all 0.2s;
        order: 2;
        /* Push it to second row if wrapped */
    }

    .tree-card-path:hover {
        color: #0ea5e9;
        background: rgba(15, 23, 42, 0.8);
        border-color: rgba(14, 165, 233, 0.3);

</style>
